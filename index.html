<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Blog de Viajes</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Mi Blog de Viajes ✈️</span>
  </div>
</nav>

<div class="container mt-4">
  <h1 class="text-center">Bienvenido a mi blog</h1>
  <p class="text-center">Aquí cuento mis viajes</p>
</div>

<div class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        <div class="card-body">
          <h5>París</h5>
          <p>Una ciudad increíble.</p>
          <button class="btn btn-primary">Ver más</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="https://picsum.photos/300/201" class="card-img-top">
        <div class="card-body">
          <h5>Roma</h5>
          <p>Historia y comida.</p>
          <button class="btn btn-primary">Ver más</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="https://picsum.photos/300/202" class="card-img-top">
        <div class="card-body">
          <h5>Tokio</h5>
          <p>Moderno y tradicional.</p>
          <button class="btn btn-primary">Ver más</button>
        </div>
      </div>
    </div>

  </div>
</div>


<div class="container mt-5">
  <h2>Contacto</h2>

  <form>
    <div class="mb-3">
      <label>Nombre</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label>Mensaje</label>
      <textarea class="form-control"></textarea>
    </div>

    <button class="btn btn-success">Enviar</button>
  </form>
</div>

<footer class="bg-dark text-white text-center mt-5 p-3">
  Mi blog de viajes © 2026
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
